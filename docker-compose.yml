version: '3.8'

services:
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data

  catalog-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: catalog_db
    ports:
      - "5433:5432"
    volumes:
      - catalog-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  streaming-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: streaming_db
    ports:
      - "5434:5432"
    volumes:
      - streaming-data:/var/lib/postgresql/data

  nats:
    image: nats:alpine
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  auth-data:
  catalog-data:
  streaming-data: